{% extends "base.html" %}

{% block title %}Login - route64{% endblock %}

{% block content %}
<!-- Centered container for the login card -->
<div style="max-width: 420px; margin: 60px auto 0;">
  
  <div class="hero" style="text-align: center; margin-bottom: 32px;">
    <div class="hero-eyebrow" style="justify-content: center;">
      <span class="pulse-dot"></span> Working
    </div>
    <h1>Authentication</h1>
    <p style="margin: 0 auto;">Authenticate to access the dashboard.</p>
  </div>

  <div class="form-panel">
    <form method="POST" action="/login">
      <div class="form-grid">
        

        <!-- Discord Login Button -->
        <div class="field full">
          <a href="{{ url_for('discordlogin') }}" class="btn" style="justify-content: center; width: 100%; background-color: #5865F2; border-color: #5865F2; color: #ffffff; transition: opacity 0.15s ease;">
            <!-- Simple Discord SVG Icon -->
            <svg width="18" height="18" viewBox="0 0 127.14 96.36" fill="currentColor" style="margin-right: 4px; transform: translateY(-1px);">
              <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.1,46,96,53,91,65.69,84.69,65.69Z"/>
            </svg>
            Login with Discord
          </a>
        </div>

      </div>
    </form>
  </div>

</div>

<!-- Inline hover style specifically for the Discord button to make it feel responsive -->
<style>
  a[href*="discord"]:hover {
    opacity: 0.9;
  }
  .register-link:hover {
    color: var(--accent) !important;
  }
</style>
{% endblock %}
